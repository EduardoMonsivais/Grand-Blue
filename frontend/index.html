<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Sen</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="./images/Health.png" type="image/png">
  <meta name="theme-color" content="#2c3e50" />
</head>
<body>

  <header>
    <nav>
      <div class="logo">🩺 Health <span>Sen</span></div>
      <div class="links">
        <a href="#">Inicio</a>
        <a href="#producto">Producto</a>
        <a href="#metas">Metas</a>
        <a href="#justificacion">Justificación</a>
        <a href="https://www.facebook.com/profile.php?id=61556278896789" target="_blank">Contacto</a>
      </div>
    </nav>

    <section class="hero">
      <div class="hero-text">
        <h1>Tu salud es lo más importante</h1>
        <p>Especialmente para los más grandes en el hogar ❤️</p>
        <a href="#producto" class="btn">Conoce más</a>
        <a href="inicio.html" class="btn btn-login">Iniciar sesión</a>
      </div>

      <div class="hero-img">
        <img src="images/Health.jpg" alt="Aplicación Health Sen">
      </div>
    </section>

    <div class="wave">
      <svg viewBox="0 0 500 150" preserveAspectRatio="none">
        <path d="M0.00,49.98 C150.00,150.00 349.72,-49.98 500.00,49.98 L500.00,150.00 L0.00,150.00 Z"
              style="stroke: none; fill: #ffffff;"></path>
      </svg>
    </div>
  </header>

  <main>
  </main>

  <footer>
    <div class="contenedor-footer">
      <div class="content-foo">
        <h4>Teléfono</h4>
        <p>81165474</p>
      </div>
      <div class="content-foo">
        <h4>Correo</h4>
        <p>chokokta198@gmail.com</p>
      </div>
      <div class="content-foo">
        <h4>Redes Sociales</h4>
        <p>@Health-Sen</p>
      </div>
    </div>
    <h2 class="titulo-final">© 2025 Health Sen</h2>
  </footer>

  <script>
    const API_BASE_URL = 'http://localhost:3000';

    fetch(`${API_BASE_URL}/api/verify`, {
      method: 'GET',
      credentials: 'include'
    })
      .then(async res => {
        if (!res.ok) return;
        const data = await res.json();
        if (data.authenticated) {
          window.location.href = 'dashboard.html';
        }
      })
      .catch(err => console.error('Error al verificar sesión:', err));
  </script>

  <!-- ✅ Registro del Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('✅ Service Worker registrado:', reg.scope))
          .catch(err => console.error('❌ Error al registrar el Service Worker:', err));
      });
    }
  </script>

</body>
</html>
